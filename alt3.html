<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Alt 3 - Lake Reflections</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="alt3.css">
</head>
<body>
<main class="wrap">
  <svg viewBox="0 0 1200 800" class="scene">
    <rect width="1200" height="420" fill="#87ceeb"/>
    <path d="M0,360 C200,300 420,320 700,260 C980,200 1250,260 1250,260 L1250,900 L0,900 Z" fill="#fff"/>
    <g class="trees">
      <g class="tree" data-key="work" transform="translate(100,560)">
        <polygon points="0,0 -50,100 50,100" fill="#2fae56"/>
        <rect class="trunk" x="-10" y="100" width="20" height="44" fill="#6b3d18"/>
      </g>
      <g class="tree" data-key="academics" transform="translate(360,620)">
        <polygon points="0,0 -50,100 50,100" fill="#2fae56"/>
        <rect class="trunk" x="-10" y="100" width="20" height="44" fill="#6b3d18"/>
      </g>
      <g class="tree" data-key="hobbies" transform="translate(640,520)">
        <polygon points="0,0 -50,100 50,100" fill="#2fae56"/>
        <rect class="trunk" x="-10" y="100" width="20" height="44" fill="#6b3d18"/>
      </g>
    </g>
  </svg>
  <div id="zoom-root"></div>
</main>
<script src="alt3.js"></script>
</body>
</html>
