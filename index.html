<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mountain Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <svg class="scene" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <!-- Sky triangle -->
      <polygon id="sky" points="1200,0 1200,300 0,0" fill="#63c7f6" />
      <!-- Clouds -->
      <g id="clouds" fill="#cfcfcf">
        <ellipse cx="300" cy="70" rx="70" ry="40" />
        <ellipse cx="360" cy="60" rx="50" ry="32" />
        <ellipse cx="820" cy="60" rx="120" ry="64" />
        <ellipse cx="1080" cy="80" rx="68" ry="42" />
      </g>
      <!-- Snow hill overlay (white rounded shape) -->
      <path id="snow" d="M-50,320 C150,360 380,420 610,360 C820,300 920,300 1250,380 L1250,900 L-50,900 Z" fill="#ffffff" />

      <!-- Winding path -->
      <path id="path" d="M620,290 C640,360 760,320 700,380 C620,460 720,520 840,520 C960,520 1030,540 915,640 C760,780 350,700 270,760"
        stroke="#c6c6c6" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round" />

      <!-- Trees group (three trees) -->
      <g id="trees">
        <!-- left tree -->
        <g class="tree" data-key="hobbies" transform="translate(140,520) scale(1)">
          <rect class="trunk" x="-10" y="60" width="20" height="40" fill="#6b3d18" />
          <g class="foliage" fill="#58d16a">
            <polygon points="0,0 -32,68 32,68" />
            <polygon points="0,18 -40,82 40,82" />
            <polygon points="0,36 -44,96 44,96" />
          </g>
        </g>

        <!-- center tree -->
        <g class="tree" data-key="academics" transform="translate(420,560) scale(1)">
          <rect class="trunk" x="-10" y="60" width="20" height="40" fill="#6b3d18" />
          <g class="foliage" fill="#58d16a">
            <polygon points="0,0 -36,72 36,72" />
            <polygon points="0,18 -44,86 44,86" />
            <polygon points="0,36 -48,98 48,98" />
          </g>
        </g>

        <!-- right tree -->
        <g class="tree" data-key="work" transform="translate(260,660) scale(1)">
          <rect class="trunk" x="-10" y="60" width="20" height="40" fill="#6b3d18" />
          <g class="foliage" fill="#58d16a">
            <polygon points="0,0 -28,60 28,60" />
            <polygon points="0,16 -36,74 36,74" />
            <polygon points="0,34 -40,92 40,92" />
          </g>
        </g>
      </g>
    </svg>

    <!-- Zoom trunk element (created/used by JS) -->
    <div id="zoom-root" aria-hidden="true"></div>

  </main>
  <script src="script.js"></script>
</body>
</html>
