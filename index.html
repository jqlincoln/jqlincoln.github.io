<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Portfolio</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
  <main class="scene">
    <div class="trees" aria-label="Section trees">
      <div class="tree academics" onclick="showContent('academics')">
        <div class="branches">
          <div class="branch left"></div>
          <div class="branch right"></div>
        </div>
        <div class="leaves">
          <div class="leaf leaf1"></div>
          <div class="leaf leaf2"></div>
          <div class="leaf leaf3"></div>
        </div>
        <div class="trunk"></div>
        <span class="tree-label">Academics</span>
      </div>
      <div class="tree work" onclick="showContent('work')">
        <div class="branches">
          <div class="branch left"></div>
          <div class="branch right"></div>
        </div>
        <div class="leaves">
          <div class="leaf leaf1"></div>
          <div class="leaf leaf2"></div>
          <div class="leaf leaf3"></div>
        </div>
        <div class="trunk"></div>
        <span class="tree-label">Work Experience</span>
      </div>
      <div class="tree hobbies" onclick="showContent('hobbies')">
        <div class="branches">
          <div class="branch left"></div>
          <div class="branch right"></div>
        </div>
        <div class="leaves">
          <div class="leaf leaf1"></div>
          <div class="leaf leaf2"></div>
          <div class="leaf leaf3"></div>
        </div>
        <div class="trunk"></div>
        <span class="tree-label">Hobbies</span>
      </div>
    </div>
    <div id="content-overlay" class="content-overlay">
      <div class="zoomed-trunk">
        <div class="bark-text" id="bark-text"></div>
        <button class="close-btn" onclick="closeContent()">×</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
