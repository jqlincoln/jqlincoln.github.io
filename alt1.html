<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Alt 1 - Minimal Pine</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="alt1.css">
</head>
<body>
<main class="wrap">
  <svg viewBox="0 0 1200 800" class="scene" preserveAspectRatio="xMidYMid slice">
    <rect width="1200" height="400" fill="#6dd1ff"/>
    <path d="M0,350 C180,300 420,320 700,260 C980,200 1250,260 1250,260 L1250,900 L0,900 Z" fill="#fff"/>
    <!-- snaking ski track (starts at snowline, continues through bottom) -->
    <path id="ski-track" d="M700,280
        C720,350 860,310 800,370
        C740,430 820,490 940,490
        C1060,490 1130,520 1000,640
        C820,780 400,720 320,780"
      fill="none" stroke="#c6c6c6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />

    <!-- trees as stacked triangles, no labels -->
    <g class="trees">
      <g class="tree" data-key="hobbies" transform="translate(120,410)">
        <polygon points="0,0 -36,72 36,72" fill="#3dbb5b"/>
        <polygon points="0,24 -44,86 44,86" fill="#35ad52"/>
        <polygon points="0,48 -48,98 48,98" fill="#2f9d49"/>
        <rect class="trunk" x="-8" y="98" width="16" height="36" fill="#6b3d18"/>
      </g>
      <g class="tree" data-key="academics" transform="translate(380,480)">
        <polygon points="0,0 -36,72 36,72" fill="#3dbb5b"/>
        <polygon points="0,24 -44,86 44,86" fill="#35ad52"/>
        <polygon points="0,48 -48,98 48,98" fill="#2f9d49"/>
        <rect class="trunk" x="-8" y="98" width="16" height="36" fill="#6b3d18"/>
      </g>
      <g class="tree" data-key="work" transform="translate(270,540)">
        <polygon points="0,0 -36,72 36,72" fill="#3dbb5b"/>
        <polygon points="0,24 -44,86 44,86" fill="#35ad52"/>
        <polygon points="0,48 -48,98 48,98" fill="#2f9d49"/>
        <rect class="trunk" x="-8" y="98" width="16" height="36" fill="#6b3d18"/>
      </g>
    </g>
  </svg>
  <div id="zoom-root"></div>
</main>
<script src="alt1.js"></script>
</body>
</html>
