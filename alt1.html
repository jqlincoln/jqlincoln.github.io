<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Layers - Alt Design 1</title>
  <link rel="stylesheet" href="alt1.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
  <main class="scene">
    <div class="mountain-container">
      <div class="peak"></div>
      <div class="layer layer-academics" onclick="showContent('academics')">
        <div class="layer-content">
          <h3>Academics</h3>
        </div>
      </div>
      <div class="layer layer-work" onclick="showContent('work')">
        <div class="layer-content">
          <h3>Work Experience</h3>
        </div>
      </div>
      <div class="layer layer-hobbies" onclick="showContent('hobbies')">
        <div class="layer-content">
          <h3>Hobbies</h3>
        </div>
      </div>
    </div>
    <div id="content-overlay" class="content-overlay">
      <div class="content-card">
        <div class="card-content" id="card-content"></div>
        <button class="close-btn" onclick="closeContent()">×</button>
      </div>
    </div>
  </main>
  <script src="alt1.js"></script>
</body>
</html>
