<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Alt 2 – Pine Zoom</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="alt2.css">
</head>
<body>
<main class="wrap">
  <svg id="main-scene" viewBox="0 0 1200 800" class="scene" preserveAspectRatio="xMidYMid slice">
    <defs>
      <pattern id="bark-pattern" patternUnits="userSpaceOnUse" x="0" y="0" width="200" height="200">
        <image id="bark-pattern-img" x="0" y="0" width="200" height="200"/>
      </pattern>
      <linearGradient id="trunk-grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#1a0a02" stop-opacity="0.45"/>
        <stop offset="40%"  stop-color="#7a4220" stop-opacity="0"/>
        <stop offset="100%" stop-color="#1a0a02" stop-opacity="0.35"/>
      </linearGradient>
      <linearGradient id="trunk-base-fade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#3d1a08" stop-opacity="0"/>
        <stop offset="100%" stop-color="#3d1a08" stop-opacity="0.6"/>
      </linearGradient>
      <radialGradient id="ground-shadow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#1a0a02" stop-opacity="0.25"/>
        <stop offset="55%"  stop-color="#1a0a02" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#1a0a02" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Enhanced sky gradient for depth -->
    <defs>
      <linearGradient id="sky-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#87ceeb" stop-opacity="1"/>
        <stop offset="40%" stop-color="#b0d4f1" stop-opacity="1"/>
        <stop offset="100%" stop-color="#e8f4f8" stop-opacity="1"/>
      </linearGradient>
      <linearGradient id="snow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fbfbfb" stop-opacity="1"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="100%" stop-color="#f5f5f5" stop-opacity="0.95"/>
      </linearGradient>
    </defs>
    <rect id="bark-backdrop" x="-5000" y="-5000" width="11200" height="10800" fill="#8c4e22"/>
    <rect width="1200" height="400" fill="url(#sky-grad)"/>
    <path d="M0,350 C180,300 420,320 700,260 C980,200 1250,260 1250,260 L1250,900 L0,900 Z" fill="url(#snow-grad)"/>
    <path id="ski-track"
      d="M700,280 C720,350 860,310 800,370 C740,430 820,490 940,490 C1060,490 1130,520 1000,640 C820,780 400,720 320,780"
      fill="none" stroke="#c6c6c6" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ── Tree: Hobbies ── -->
    <!-- trunk centre in world coords: translate(120,390) + local(0, 128+24) = world(120, 542) -->
    <g class="tree" data-key="hobbies" data-trunk-cx="120" data-trunk-cy="542">
      <g class="tree-body">
        <g transform="translate(120,390)">
          <g class="foliage">
            <polygon points="0,-20 -28,48 28,48"   fill="#44c962"/>
            <polygon points="0,18  -38,76 38,76"   fill="#3dbb5b"/>
            <polygon points="0,44  -50,100 50,100" fill="#35ad52"/>
            <polygon points="0,68  -56,128 56,128" fill="#2f9d49"/>
          </g>
          <ellipse cx="0" cy="178" rx="22" ry="5" fill="url(#ground-shadow)"/>
          <rect class="trunk" x="-9" y="128" width="18" height="48" fill="url(#bark-pattern)"/>
          <rect x="-9" y="128" width="18" height="48" fill="url(#trunk-grad)"/>
          <rect x="-9" y="162" width="18" height="14" fill="url(#trunk-base-fade)"/>
          <!-- Text sits in trunk-local space: y=128 is trunk top, y=176 is trunk bottom -->
          <text class="etched-title" x="-7" y="140" text-anchor="start">Hobbies</text>
          <text class="etched-item"  x="-7" y="150" text-anchor="start">Skiing</text>
          <text class="etched-item"  x="-7" y="158" text-anchor="start">Photography</text>
          <text class="etched-item"  x="-7" y="166" text-anchor="start">Painting</text>
        </g>
      </g>
    </g>

    <!-- ── Tree: Academics ── -->
    <!-- trunk centre: translate(460,350) + local(0, 128+24) = world(460, 502) -->
    <g class="tree" data-key="academics" data-trunk-cx="460" data-trunk-cy="502">
      <g class="tree-body">
        <g transform="translate(460,350)">
          <g class="foliage">
            <polygon points="0,-20 -28,48 28,48"   fill="#44c962"/>
            <polygon points="0,18  -38,76 38,76"   fill="#3dbb5b"/>
            <polygon points="0,44  -50,100 50,100" fill="#35ad52"/>
            <polygon points="0,68  -56,128 56,128" fill="#2f9d49"/>
          </g>
          <ellipse cx="0" cy="178" rx="22" ry="5" fill="url(#ground-shadow)"/>
          <rect class="trunk" x="-9" y="128" width="18" height="48" fill="url(#bark-pattern)"/>
          <rect x="-9" y="128" width="18" height="48" fill="url(#trunk-grad)"/>
          <rect x="-9" y="162" width="18" height="14" fill="url(#trunk-base-fade)"/>
          <text class="etched-title" x="-7" y="140" text-anchor="start">Academics</text>
          <text class="etched-item"  x="-7" y="150" text-anchor="start">Degree</text>
          <text class="etched-item"  x="-7" y="158" text-anchor="start">Thesis</text>
          <text class="etched-item"  x="-7" y="166" text-anchor="start">Courses</text>
        </g>
      </g>
    </g>

    <!-- ── Tree: Work ── -->
    <!-- trunk centre: translate(290,490) + local(0, 128+24) = world(290, 642) -->
    <g class="tree" data-key="work" data-trunk-cx="290" data-trunk-cy="642">
      <g class="tree-body">
        <g transform="translate(290,490)">
          <g class="foliage">
            <polygon points="0,-20 -28,48 28,48"   fill="#44c962"/>
            <polygon points="0,18  -38,76 38,76"   fill="#3dbb5b"/>
            <polygon points="0,44  -50,100 50,100" fill="#35ad52"/>
            <polygon points="0,68  -56,128 56,128" fill="#2f9d49"/>
          </g>
          <ellipse cx="0" cy="178" rx="22" ry="5" fill="url(#ground-shadow)"/>
          <rect class="trunk" x="-9" y="128" width="18" height="48" fill="url(#bark-pattern)"/>
          <rect x="-9" y="128" width="18" height="48" fill="url(#trunk-grad)"/>
          <rect x="-9" y="162" width="18" height="14" fill="url(#trunk-base-fade)"/>
          <text class="etched-title" x="-7" y="140" text-anchor="start">Work</text>
          <text class="etched-item"  x="-7" y="150" text-anchor="start">Job</text>
          <text class="etched-item"  x="-7" y="158" text-anchor="start">Projects</text>
          <text class="etched-item"  x="-7" y="166" text-anchor="start">Skills</text>
        </g>
      </g>
    </g>
  </svg>

  <div id="zoom-root"></div>
</main>
<script src="alt2.js"></script>
</body>
</html>
