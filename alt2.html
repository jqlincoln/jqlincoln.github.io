<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Alt 2 - Cartoon Pines</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="alt2.css">
</head>
<body>
<main class="wrap">
  <svg viewBox="0 0 1200 800" class="scene">
    <polygon points="1200,0 1200,320 0,0" fill="#63c7f6" />
    <path d="M-20,340 C160,380 400,420 680,360 C900,310 1120,340 1250,380 L1250,900 L-50,900 Z" fill="#fff" />

    <g class="trees">
      <g class="tree" data-key="academics" transform="translate(180,540)">
        <circle cx="0" cy="20" r="42" fill="#57c76b" />
        <circle cx="0" cy="0" r="36" fill="#45bd5a" />
        <rect class="trunk" x="-8" y="60" width="16" height="40" fill="#5a3417" />
      </g>
      <g class="tree" data-key="hobbies" transform="translate(440,600)">
        <circle cx="0" cy="20" r="42" fill="#57c76b" />
        <circle cx="0" cy="0" r="36" fill="#45bd5a" />
        <rect class="trunk" x="-8" y="60" width="16" height="40" fill="#5a3417" />
      </g>
      <g class="tree" data-key="work" transform="translate(300,680)">
        <circle cx="0" cy="20" r="42" fill="#57c76b" />
        <circle cx="0" cy="0" r="36" fill="#45bd5a" />
        <rect class="trunk" x="-8" y="60" width="16" height="40" fill="#5a3417" />
      </g>
    </g>
  </svg>
  <div id="zoom-root"></div>
</main>
<script src="alt2.js"></script>
</body>
</html>
