<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Cabin - Alt Design 2</title>
  <link rel="stylesheet" href="alt2.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
  <main class="scene">
    <div class="cabin">
      <div class="wall left-wall">
        <div class="shelf">
          <div class="icon academics" onclick="showContent('academics')">
            <div class="book"></div>
            <span class="label">Academics</span>
          </div>
        </div>
      </div>
      
      <div class="wall center-wall">
        <div class="fireplace">
          <div class="fire"></div>
        </div>
      </div>
      
      <div class="wall right-wall">
        <div class="shelf">
          <div class="icon work" onclick="showContent('work')">
            <div class="briefcase"></div>
            <span class="label">Work</span>
          </div>
          <div class="icon hobbies" onclick="showContent('hobbies')">
            <div class="backpack"></div>
            <span class="label">Hobbies</span>
          </div>
        </div>
      </div>
    </div>
    
    <div id="content-overlay" class="content-overlay">
      <div class="snow-globe">
        <div class="globe-content" id="globe-content"></div>
        <button class="close-btn" onclick="closeContent()">×</button>
      </div>
    </div>
  </main>
  <script src="alt2.js"></script>
</body>
</html>
